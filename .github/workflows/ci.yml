name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Permisos al gradlew
        run: chmod +x ./gradlew

      - name: Build (compile + tests con H2 en memoria)
        run: ./gradlew build --no-daemon

      - name: Subir reporte de tests si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: build/reports/
          retention-days: 7
