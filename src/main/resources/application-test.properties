# =============================================================================
#  application-test.properties
#  Perfil "test" - usado por tests automatizados y por CI.
#  Versionado en git: NO contiene secretos.
#
#  BD en memoria (H2) para no requerir MariaDB durante el build.
#  Cuando agreguemos tests de integracion mas serios usaremos Testcontainers
#  con MariaDB real, pero para Sprint 0 alcanza con H2.
# =============================================================================

# H2 en memoria, modo de compatibilidad MariaDB para minimizar diferencias
spring.datasource.url=jdbc:h2:mem:testdb;MODE=LEGACY;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate genera el esquema desde las entidades (no usamos las migraciones de
# MariaDB porque H2 no entiende algunos CHECK constraints especificos).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway desactivado en tests (Hibernate genera el esquema)
spring.flyway.enabled=false

# Logs minimos en tests
logging.level.root=WARN
logging.level.edu.cent35=INFO
