<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Asistencias</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="login-body">
    <main class="login-card">
        <header class="login-card__header">
            <div class="login-card__logo">A</div>
            <h1>Sistema de Asistencias</h1>
            <p class="login-card__subtitle">Iniciar sesión</p>
        </header>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autofocus
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-input">
                    <input type="password" id="password" name="password" required
                           autocomplete="current-password">
                    <button type="button" class="password-toggle"
                            aria-label="Mostrar contraseña">&#x1F441;</button>
                </div>
            </div>

            <button type="submit" class="btn btn--primary btn--full">Ingresar</button>
        </form>

        <p class="login-card__hint">
            <small>Sprint 1 — usar usuarios reales (ver <code>credenciales_proyecto.txt</code>).</small>
        </p>
    </main>

    <!-- Flash data: convierte ?error y ?logout en toasts -->
    <div th:if="${param.error}"  id="flash-data"
         data-error="Usuario o contraseña incorrectos." hidden></div>
    <div th:if="${param.logout}" id="flash-data"
         data-success="Sesión cerrada correctamente." hidden></div>

    <script th:src="@{/js/toast.js}" defer></script>
    <script th:src="@{/js/password-ui.js}" defer></script>
</body>
</html>
