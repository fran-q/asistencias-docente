<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - Asistencias</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="login-body">
    <main class="login-card">
        <header class="login-card__header">
            <div class="login-card__logo">A</div>
            <h1>Sistema de Asistencias</h1>
            <p class="login-card__subtitle">Iniciar sesion</p>
        </header>

        <!-- Mensajes de feedback -->
        <div th:if="${param.error}" class="alert alert--error" role="alert">
            Usuario o contrasena incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert--success" role="alert">
            Sesion cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autofocus
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn--primary btn--full">Ingresar</button>
        </form>

        <p class="login-card__hint">
            <small>Sprint 0 - Login provisorio: <code>admin</code> / <code>admin</code></small>
        </p>
    </main>
</body>
</html>
