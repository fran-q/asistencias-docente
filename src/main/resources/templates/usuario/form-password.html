<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::section})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cambiar contraseña - Asistencias</title>
</head>
<body>
    <section class="usuarios-form">
        <header class="page-header">
            <h1>Cambiar contraseña</h1>
            <p class="page-header__subtitle">
                Reseteo de contraseña para
                <strong th:text="${usuario.username}">usuario</strong>
                (<span th:text="${usuario.nombre + ' ' + usuario.apellido}">nombre</span>).
            </p>
        </header>

        <div class="card" style="max-width: 480px;">
            <form th:action="@{/usuarios/{id}/password(id=${usuario.id})}" th:object="${form}" method="post" novalidate>

                <div class="form-group">
                    <label for="nuevaPassword">Nueva contraseña <span class="required">*</span></label>
                    <div class="password-input">
                        <input type="password" id="nuevaPassword" th:field="*{nuevaPassword}" required
                               minlength="6" maxlength="60" autocomplete="new-password"
                               th:classappend="${#fields.hasErrors('nuevaPassword')} ? 'is-invalid'">
                        <button type="button" class="password-toggle"
                                aria-label="Mostrar contraseña">&#x1F441;</button>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('nuevaPassword')}"
                          th:errors="*{nuevaPassword}">err</span>
                </div>

                <div class="form-group">
                    <label for="confirmacion">Repetir contraseña <span class="required">*</span></label>
                    <div class="password-input">
                        <input type="password" id="confirmacion" th:field="*{confirmacion}" required
                               autocomplete="new-password"
                               th:classappend="${#fields.hasErrors('confirmacion')} ? 'is-invalid'">
                        <button type="button" class="password-toggle"
                                aria-label="Mostrar contraseña">&#x1F441;</button>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('confirmacion')}"
                          th:errors="*{confirmacion}">err</span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn--primary">Resetear contraseña</button>
                    <a th:href="@{/usuarios}" class="btn btn--ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
