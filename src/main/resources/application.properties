# =============================================================================
#  application.properties
#  Configuracion BASE de la aplicacion (versionada en git, sin secretos).
#
#  Las credenciales y configuracion local viven en application-local.properties
#  (gitignored). Los tests usan application-test.properties (perfil "test").
#
#  Como activar perfiles:
#   - Local:  ./gradlew bootRun  (lo activa automaticamente, ver build.gradle)
#             En IntelliJ: Run Configuration > Active profiles: local
#   - Tests:  Se activa via @ActiveProfiles("test") en las clases de test
#   - CI:     Idem tests
# =============================================================================

spring.application.name=asistencias

# ---- JPA / Hibernate ----
# El esquema lo gestiona Flyway, Hibernate solo valida que coincida con las entidades.
# El dialecto lo autodetecta Hibernate desde el driver MariaDB (no hace falta setearlo).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Ushuaia

# ---- Flyway (migraciones de esquema) ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Servidor ----
server.port=8080
server.servlet.session.timeout=30m
server.error.include-message=always
server.error.include-binding-errors=always

# ---- Logs ----
logging.level.root=INFO
logging.level.org.springframework.security=INFO
# Patron de consola con tenantId y userId via MDC (para multi-tenant traceability)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [tenant=%X{tenantId:-N/A} user=%X{userId:-N/A}] %logger{36} - %msg%n

# ---- Actuator (solo lo basico, sin exponer endpoints sensibles) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
